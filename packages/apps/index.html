<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="/manifest.json">
    <link rel="shortcut icon" href="/favicon.ico">
    <title>The Root Network Portal</title>
    <script type="text/javascript" src="/env-config.js"></script>
    <style>
      :root {
        --font-mono: 0.889em "Geist Mono Variable", "Geist Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        --font-sans: 1em "Geist Variable", "Geist", "Inter", "Segoe UI", sans-serif;
        --font-percent-small: 88.9%;
        --font-percent-tiny: 79.0%;
        --font-size-base: 0.96rem;
        --font-size-h1: 1.424rem;
        --font-size-h2: 1.266rem;
        --font-size-h3: 1.125rem;
        --font-size-small: 0.86rem;
        --font-size-tiny: 0.75rem;
        --font-weight-bold: 600;
        --font-weight-light: 200;
        --font-weight-normal: 400;
        --opacity-light: 0.6;
        --width-full: 1750px;
        --width-half: 875px;
        --width-shortaddr: 6.5em;
        --width-shorthash: 9em;
        --font-weight-header: var(--font-weight-normal);
        --font-size-label: var(--font-size-small);
        --font-weight-label: var(--font-weight-bold);
        --text-transform-label: lowercase;
        --bg-menu-hover: rgba(255, 255, 255, 0.2);
        --radius-sm: 0.25rem;
        --radius-md: 0.5rem;
        --radius-lg: 0.75rem;
        --radius-xl: 0.875rem;
        --shadow-1: 0 10px 30px rgba(15, 23, 42, 0.06);
        --shadow-2: 0 18px 50px rgba(15, 23, 42, 0.12);
        --shadow-3: 0 24px 70px rgba(15, 23, 42, 0.18);
        --transition-fast: 120ms ease;
        --transition-base: 180ms ease;
      }

      [data-theme="dark"] {
        --bg-identicon-circle: #282829;
        --bg-input: #38393f;
        --bg-input-error: #48393f;
        --bg-inverse: rgba(78, 78, 78, 0.66);
        --bg-menu: #26272c;
        --bg-page: #26272c;
        --bg-table: #3b3d3f;
        --bg-tabs: #38393f;
        --bg-toggle: #58595f;
        --bg-sidebar: #1a1b20;
        --bg-static-extra: rgba(200, 200, 200, 0.1);
        --border-identicon: transparent;
        --border-input: rgba(234, 236, 238, .15);
        --border-table: #343536;
        --border-tabs: #343536;
        --color-bounty-info: #8E8E8E;
        --color-checkbox: rgba(78, 78, 78, 0.66);
        --color-error: rgba(255, 83, 83, 0.8);
        --color-text: rgba(244, 242, 240, 0.8);
        --border-subtle: rgba(255, 255, 255, 0.1);
        --surface-1: rgba(255, 255, 255, 0.025);
        --surface-2: rgba(255, 255, 255, 0.045);
        --surface-3: rgba(255, 255, 255, 0.075);
        --backdrop-page: radial-gradient(circle at top left, rgba(255, 255, 255, 0.05), transparent 34%), radial-gradient(circle at top right, rgba(255, 255, 255, 0.035), transparent 28%);
        --opacity-gray: 0.1;
      }

      [data-theme="light"] {
        --bg-identicon-circle: #eee;
        --bg-input: #ffffff;
        --bg-input-error: #fff6f6;
        --bg-inverse: rgba(244, 242, 240, 0.91);
        --bg-menu: #ffffff;
        --bg-page: #f5f3f1;
        --bg-table: #ffffff;
        --bg-tabs: #ffffff;
        --bg-toggle: #e4e5e6;
        --bg-sidebar: #fafafa;
        --bg-static-extra: rgba(200, 200, 200, 0.1);
        --border-identicon: #ddd;
        --border-input: rgba(34, 36, 38, .15);
        --border-table: #efedeb;
        --border-tabs: #f1efed;
        --color-bounty-info: #4D4D4D;
        --color-checkbox: rgba(34, 36, 38, 0.15);
        --color-error: rgba(139, 0, 0);
        --color-text: rgba(78, 78, 78, 0.8);
        --border-subtle: rgba(34, 36, 38, 0.08);
        --surface-1: rgba(255, 255, 255, 0.66);
        --surface-2: rgba(255, 255, 255, 0.88);
        --surface-3: rgba(255, 255, 255, 0.98);
        --backdrop-page: radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 32%), radial-gradient(circle at top right, rgba(255, 255, 255, 0.72), transparent 26%);
        --opacity-gray: 0.75;
      }

      .--absolute {
        position: absolute;
      }

      .--digits {
        font-variant-numeric: tabular-nums;
        text-align: right;
        white-space: nowrap;
      }

      .--hidden {
        display: none;
      }

      .--relative {
        position: relative;
      }

      .--tmp {
        background: grey;
        filter: blur(2px);
        opacity: 0.15;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <div id="tooltips"></div>
    <script>
      if (window.self !== window.top) {
        window.top.location.href = window.location.href;
      }
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
